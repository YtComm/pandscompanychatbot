/*

ADD MESSAGE
========================================================

function addMsg(content,type='b'){

  const wrap = document.createElement('div');

  wrap.className = `msg ${type}`;

  const bubble = document.createElement('div');

  bubble.className = 'bubble';

  bubble.innerHTML = content;

  wrap.appendChild(bubble);

  msgs.appendChild(wrap);

  msgs.scrollTop = msgs.scrollHeight;

}



/*
========================================================
SEARCH PRODUCTS
========================================================
*/

function findProducts(query){

  query = query.toLowerCase().trim();

  const ignored = [
    'show',
    'me',
    'for',
    'girls',
    'girl',
    'kids',
    'kid',
    'please',
    'want',
    'need',
    'with',
    'and',
    'some',
    'give',
    'can',
    'you'
  ];



  const words = query
    .replace(/[^\w\s]/g,'')
    .split(/\s+/)
    .filter(word =>
      word &&
      !ignored.includes(word)
    );



  if(words.length === 0){

    return PRODUCTS.slice(0,5);

  }



  const results = PRODUCTS.map(product => {

    const name = product.n.toLowerCase();

    let score = 0;



    words.forEach(word => {

      if(name.includes(word)){

        score += 2;

      }



      const synonymMap = {

        lehenga:['lehenga','ghagra','ghaghra'],
        ghagra:['lehenga','ghagra','ghaghra'],
        ghaghra:['lehenga','ghagra','ghaghra'],

        yellow:['yellow','mustard','golden'],
        green:['green','mint','lime'],
        pink:['pink','fuchsia','hot pink'],
        purple:['purple','lavender'],
        blue:['blue','navy'],

        mirror:['mirror'],
        floral:['floral','flower'],
        tiger:['tiger'],
        sharara:['sharara'],
        kurta:['kurta']

      };



      const synonyms = synonymMap[word];



      if(synonyms){

        synonyms.forEach(s => {

          if(name.includes(s)){

            score += 1;

          }

        });

      }

    });



    return {
      ...product,
      score
    };

  });



  return results
    .filter(p => p.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0,5);

}



/*
========================================================
RENDER PRODUCTS
========================================================
*/

function renderProducts(products){

  if(!products.length){

    return `

      Sorry 😭<br><br>

      Couldn't find matching products.

    `;
  }



  return `

    <div>

      <p>
        Here are a few options you may like:
      </p>

      <ul>

        ${products.map(product => `

          <li>

            <a
              href="${product.u}"
              target="_blank"
              rel="noopener noreferrer"
            >

              ${product.n}

            </a>

          </li>

        `).join('')}

      </ul>

    </div>

  `;
}



/*

BOT REPLY
========================================================
*/

async function botReply(text){

  const q = text.toLowerCase().trim();



  const productKeywords = [

    'lehenga',
    'ghagra',
    'ghaghra',
    'kurta',
    'sharara',
    'dress',
    'pant',
    'dupatta',
    'jacket',
    'sherwani',

    'yellow',
    'pink',

    'blue',
    'lavender',
    'mint',
    'black',
    'white',

    'mirror',
    'floral',
    'tiger',
    'embroidered'

  ];



  const isProductQuery = productKeywords.some(
    keyword => q.includes(keyword)
  );



  /*
  ========================================================
  PRODUCT SEARCH
  ========================================================
  */

  if(isProductQuery){

    const products = findProducts(q);



    if(
      !products.length ||
      products[0].score <= 0
    ){

      addMsg(`

        Sorry 😭<br><br>

        Couldn't find matching products.

      `,'b');

      return;

    }



    addMsg(
      renderProducts(products),
      'b'
    );

    return;

  }



  /*

  AI CHAT
  ========================================================
  */

  try{

    const res = await fetch(

      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`,

      {
        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({

          contents:[{

            parts:[{

              text:`

You are the P&S Company Assistant.

You help users with:
- greetings
- delivery questions
- sizing help
- customer support

Keep replies:
- short
- warm
- friendly
- under 2 sentences

DO NOT hallucinate products.
DO NOT generate fake links.

User:
${text}

              `

            }]

          }]

        })

      }

    );



    const data = await res.json();



    const reply =

      data?.candidates?.[0]?.content?.parts?.[0]?.text ||

      "Hello 👋 How can I help you today?";



    addMsg(reply,'b');

  }

  catch(err){

    addMsg(

      "Hello 👋 How can I help you today?",

      'b'

    );

  }

}

  addMsg(text,'u');

  ui.value = '';



  setTimeout(() => {

    botReply(text);

  },300);

}
